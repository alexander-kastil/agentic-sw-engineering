# .github/workflows/ebook.yml
name: Build PDF ebook
on:
    push:
        branches: [master]
    workflow_dispatch: {}
jobs:
    build-pdf:
        runs-on: ubuntu-24.04
        env:
            EBOOK_TITLE: "Master Class - Agentic Software Engineering using GitHub Copilot"
        steps:
            - uses: actions/checkout@v4
            - name: Install pandoc
              uses: pandoc/actions/setup@v1
              with:
                  version: 3.8
            - name: Verify workspace
              run: |
                  pwd
                  ls -la
                  test -f readme.md || test -f README.md
            - name: Create file list and metadata
              run: |
                  mkdir -p output
                  root_readme=$(ls -1 readme.md README.md 2>/dev/null | head -n 1)
                  echo "$root_readme" > files.txt
                  find demos -type f -iname 'readme.md' 2>/dev/null | sort >> files.txt
                  find labs -type f -iname 'readme.md' 2>/dev/null | sort >> files.txt

                  filename=$(echo "${EBOOK_TITLE}" | sed 's/[/:*?"<>|]//g')
                  echo "EBOOK_FILENAME=${filename}.pdf" >> $GITHUB_ENV

                  echo "Files to process:"
                  cat files.txt
            - name: Build PDF with Pandoc
              run: |
                  pandoc \
                    --standalone \
                    --from=gfm \
                    --toc --toc-depth=3 \
                    --metadata=title="$EBOOK_TITLE" \
                    --pdf-engine=xelatex \
                    -o output/$EBOOK_FILENAME \
                    $(cat files.txt)
              working-directory: ${{ github.workspace }}
            - uses: actions/upload-artifact@v4
              with:
                  name: ebook-pdf
                  path: output/${{ env.EBOOK_FILENAME }}
