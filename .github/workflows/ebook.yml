# .github/workflows/ebook.yml
name: Build PDF ebook
on:
    push:
        branches: [master]
    workflow_dispatch: {}
jobs:
    build-pdf:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
            - name: Install pandoc
              uses: pandoc/actions/setup@v1
              with:
                  version: 3.8
            - name: Verify workspace
              run: |
                  pwd
                  ls -la
                  test -f readme.md
            - name: Create file list and metadata
              run: |
                  mkdir -p output
                  echo "readme.md" > files.txt
                  find demos -type f -name 'readme.md' | sort >> files.txt
                  find labs -type f -name 'readme.md' | sort >> files.txt

                  title=$(grep -m 1 '^# ' readme.md | sed 's/^# //')
                  echo "EBOOK_TITLE=${title}" >> $GITHUB_ENV

                  filename=$(echo "${title}" | sed 's/[/:*?"<>|]//g')
                  echo "EBOOK_FILENAME=${filename}.pdf" >> $GITHUB_ENV

                  echo "Files to process:"
                  cat files.txt
            - name: Build PDF with Pandoc
              run: |
                  pandoc \
                    --standalone \
                    --from=gfm \
                    --toc --toc-depth=3 \
                    --metadata=title:"$EBOOK_TITLE" \
                    --pdf-engine=xelatex \
                    -o output/$EBOOK_FILENAME \
                    $(cat files.txt)
              working-directory: ${{ github.workspace }}
            - uses: actions/upload-artifact@v4
              with:
                  name: ebook-pdf
                  path: output/${{ env.EBOOK_FILENAME }}
