# .github/workflows/ebook.yml
name: Build PDF ebook
on:
    push:
        branches: [master]
    workflow_dispatch: {}
jobs:
    build-pdf:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
            - name: Create file list and metadata
              run: |
                  mkdir -p output
                  # Create file list (order: root, demos, labs)
                  echo "README.md" > files.txt
                  find demos -type f -name 'README.md' | sort >> files.txt
                  find labs -type f -name 'README.md' | sort >> files.txt

                  # Extract title from README
                  title=$(grep -m 1 '^# ' README.md | sed 's/^# //')
                  echo "EBOOK_TITLE=${title}" >> $GITHUB_ENV

                  # Create safe filename from title
                  filename=$(echo "${title}" | sed 's/[/:*?"<>|]//g')
                  echo "EBOOK_FILENAME=${filename}.pdf" >> $GITHUB_ENV

                  # Debug: show what files will be processed
                  echo "Files to process:"
                  cat files.txt
            - name: Build PDF with Pandoc
              run: |
                  docker run --rm \
                    -v ${{ github.workspace }}:/data \
                    -w /data \
                    pandoc/latex:3.8 \
                    pandoc \
                      --standalone \
                      --from=gfm \
                      --toc --toc-depth=3 \
                      --metadata=title:"$EBOOK_TITLE" \
                      --pdf-engine=xelatex \
                      -o output/$EBOOK_FILENAME \
                      README.md $(find demos labs -type f -name 'README.md' 2>/dev/null | sort)
            - uses: actions/upload-artifact@v4
              with:
                  name: ebook-pdf
                  path: output/${{ env.EBOOK_FILENAME }}
