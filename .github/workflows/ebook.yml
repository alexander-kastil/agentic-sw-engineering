# .github/workflows/ebook.yml
name: Build PDF ebook
on:
    push:
        branches: [master]
    workflow_dispatch: {}
jobs:
    build-pdf:
        runs-on: ubuntu-24.04
        env:
            EBOOK_TITLE: "Master Class - Agentic Software Engineering using GitHub Copilot"
        steps:
            - uses: actions/checkout@v4
            - name: Convert ebook to PDF
              uses: cornelius/action-md-as-pdf@main
              with:
                  markdown_dir: .
                  markdown_file: readme.md
                  pdf_file: ebook.pdf
            - uses: actions/upload-artifact@v4
              with:
                  name: ebook-pdf
                  path: ebook.pdf
